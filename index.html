<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Казахская Империя</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: #fff; margin: 0; padding: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        input, button { padding: 10px; margin: 5px 0; border-radius: 5px; border: none; }
        button { background-color: #f39c12; color: #fff; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #e67e22; }
        
        /* Авторизация */
        #auth-section { display: flex; flex-direction: column; width: 300px; margin: 100px auto; background: #2c3e50; padding: 20px; border-radius: 10px; }
        
        /* Главное приложение */
        #app-section { display: none; }
        .nav { display: flex; gap: 10px; background: #2c3e50; padding: 10px; border-radius: 5px; margin-bottom: 20px; }
        .nav button { background: transparent; color: white; border: 1px solid #f39c12; }
        .nav button.active, .nav button:hover { background: #f39c12; }
        
        .tab-content { display: none; background: #2c3e50; padding: 20px; border-radius: 5px; min-height: 300px; }
        .tab-content.active { display: block; }
        
        #admin-tab-btn { display: none; background: #c0392b; border-color: #c0392b; }
        #admin-tab-btn:hover { background: #e74c3c; }

        .chat-box { height: 200px; background: #1a1a1a; padding: 10px; overflow-y: scroll; margin-bottom: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-section">
        <h2>Вход в Империю</h2>
        <input type="text" id="username" placeholder="Ник в Minecraft">
        <input type="password" id="password" placeholder="Пароль">
        <button id="login-btn">Войти</button>
        <button id="register-btn">Зарегистрироваться</button>
        <p id="auth-error" style="color: #e74c3c; font-size: 14px;"></p>
    </div>

    <div id="app-section">
        <div class="nav">
            <button onclick="showTab('news')" class="active">Новости</button>
            <button onclick="showTab('bitcoin')">Биткоин</button>
            <button onclick="showTab('voting')">Голосования</button>
            <button onclick="showTab('chat')">Чат</button>
            <button id="admin-tab-btn" onclick="showTab('admin')">Админ-Панель</button>
            <button onclick="logout()" style="margin-left: auto; border-color: transparent;">Выход</button>
        </div>

        <div id="news" class="tab-content active">
            <h2>Новости Империи</h2>
            <div id="news-container">Тут будут новости от админов...</div>
        </div>

        <div id="bitcoin" class="tab-content">
            <h2>График Биткоина (Имперская биржа)</h2>
            <p>Ваш баланс: <span id="user-balance">0</span> монет</p>
            <canvas id="btcChart" width="400" height="200"></canvas>
        </div>

        <div id="voting" class="tab-content">
            <h2>Голосования</h2>
            <div id="votes-container">Тут будут опросы...</div>
        </div>

        <div id="chat" class="tab-content">
            <h2>Общий чат</h2>
            <div class="chat-box" id="chat-messages"></div>
            <input type="text" id="chat-input" placeholder="Введите сообщение..." style="width: 70%;">
            <button id="send-chat">Отправить</button>
        </div>

        <div id="admin" class="tab-content">
            <h2>Панель Администратора</h2>
            <p>Управление экономикой и новостями</p>
            <button onclick="alert('Функция добавления новостей в разработке')">Опубликовать новость</button>
            <br><br>
            <input type="number" id="btc-manipulate" placeholder="Новая цена биткоина">
            <button onclick="alert('Функция смены курса в разработке')">Установить курс</button>
            <br><br>
            <input type="text" id="give-coins-user" placeholder="Ник игрока">
            <input type="number" id="give-coins-amount" placeholder="Кол-во монет">
            <button onclick="alert('Функция выдачи монет в разработке')">Выдать монеты</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, get, set, child } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDsoXWRUKx-IqaYlrBhHurqj9On5yiPBNU",
      authDomain: "blumket-546e8.firebaseapp.com",
      databaseURL: "https://blumket-546e8-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "blumket-546e8",
      storageBucket: "blumket-546e8.firebasestorage.app",
      messagingSenderId: "333332861402",
      appId: "1:333332861402:web:2b13048d59f141c7ebb0e3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentUser = null;

    // --- ЛОГИКА АВТОРИЗАЦИИ ---
    document.getElementById('register-btn').addEventListener('click', async () => {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();
        const err = document.getElementById('auth-error');
        
        if(!user || !pass) return err.innerText = "Введите ник и пароль!";

        const dbRef = ref(db);
        const snapshot = await get(child(dbRef, `users/${user}`));
        
        if (snapshot.exists()) {
            err.innerText = "Такой ник уже занят!";
        } else {
            // Выдаем права админа, если ник 1mm
            const isAdmin = (user === '1mm'); 
            await set(ref(db, 'users/' + user), {
                password: pass,
                role: isAdmin ? 'admin' : 'player',
                balance: 0
            });
            alert("Регистрация успешна! Теперь войдите.");
        }
    });

    document.getElementById('login-btn').addEventListener('click', async () => {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();
        const err = document.getElementById('auth-error');

        if(!user || !pass) return err.innerText = "Введите ник и пароль!";

        const dbRef = ref(db);
        const snapshot = await get(child(dbRef, `users/${user}`));

        if (snapshot.exists() && snapshot.val().password === pass) {
            currentUser = { username: user, ...snapshot.val() };
            loginSuccess();
        } else {
            err.innerText = "Неверный ник или пароль!";
        }
    });

    function loginSuccess() {
        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('app-section').style.display = 'block';
        document.getElementById('user-balance').innerText = currentUser.balance;

        if (currentUser.role === 'admin') {
            document.getElementById('admin-tab-btn').style.display = 'inline-block';
        }
        initChart(); // Запускаем график биткоина
    }

    window.logout = function() {
        currentUser = null;
        document.getElementById('auth-section').style.display = 'flex';
        document.getElementById('app-section').style.display = 'none';
        document.getElementById('admin-tab-btn').style.display = 'none';
    }

    // --- ЛОГИКА ВКЛАДОК ---
    window.showTab = function(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav button').forEach(el => el.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');
    }

    // --- ДЕМО ГРАФИКА БИТКОИНА ---
    let btcChartInstance = null;
    function initChart() {
        if(btcChartInstance) return;
        const ctx = document.getElementById('btcChart').getContext('2d');
        btcChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['10:00', '11:00', '12:00', '13:00', '14:00', 'Сейчас'],
                datasets: [{
                    label: 'Курс B-Coin',
                    data: [100, 105, 98, 110, 108, 115],
                    borderColor: '#f39c12',
                    tension: 0.1
                }]
            },
            options: { scales: { y: { beginAtZero: false } } }
        });
    }
</script>
</body>
</html>
